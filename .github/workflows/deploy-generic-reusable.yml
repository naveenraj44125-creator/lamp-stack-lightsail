name: Reusable Generic Application Deployment (Optimized)

'on':
  workflow_call:
    inputs:
      config_file:
        description: 'Path to deployment config file'
        required: false
        type: string
        default: 'deployment-generic.config.yml'
      aws_region:
        required: false
        type: string
      instance_name:
        required: false
        type: string
      skip_tests:
        required: false
        type: boolean
        default: false
      environment:
        required: false
        type: string
      docker_image_tag:
        required: false
        type: string
    outputs:
      deployment_url:
        value: ${{ jobs.verification.outputs.app_url }}
      deployment_status:
        value: ${{ jobs.verification.outputs.status }}

permissions:
  id-token: write
  contents: read

# Cancel in-progress runs on same branch - prevents queue buildup
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      instance_name: ${{ steps.config.outputs.instance_name }}
      static_ip: ${{ steps.config.outputs.static_ip }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      app_name: ${{ steps.config.outputs.app_name }}
      app_type: ${{ steps.config.outputs.app_type }}
      app_version: ${{ steps.config.outputs.app_version }}
      should_deploy: ${{ steps.config.outputs.should_deploy }}
      enabled_dependencies: ${{ steps.config.outputs.enabled_dependencies }}
      test_enabled: ${{ steps.config.outputs.test_enabled }}
      os_type: ${{ steps.config.outputs.os_type }}
      package_manager: ${{ steps.config.outputs.package_manager }}
      verification_port: ${{ steps.config.outputs.verification_port }}
      verification_path: ${{ steps.config.outputs.verification_path }}
    steps:
    - name: Checkout calling repo
      uses: actions/checkout@v4

    # OPTIMIZATION: Cache deployment scripts instead of re-cloning every job
    - name: Cache deployment scripts
      id: cache-scripts
      uses: actions/cache@v4
      with:
        path: workflows
        key: deploy-scripts-${{ github.sha }}
        restore-keys: deploy-scripts-

    - name: Checkout deployment scripts (only if cache miss)
      if: steps.cache-scripts.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        repository: naveenraj44125-creator/lamp-stack-lightsail
        path: _deployment_scripts
        sparse-checkout: workflows  # OPTIMIZATION: only fetch workflows dir

    - name: Setup deployment scripts (only if cache miss)
      if: steps.cache-scripts.outputs.cache-hit != 'true'
      run: |
        cp -r _deployment_scripts/workflows ./workflows
        rm -rf _deployment_scripts

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
        role-duration-seconds: 900  # OPTIMIZATION: 15 min is enough
        aws-region: ${{ inputs.aws_region || 'us-east-1' }}

    # OPTIMIZATION: Cache pip dependencies
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-boto3-${{ runner.os }}
        restore-keys: pip-boto3-

    - name: Setup Python
      run: python3 -m pip install --quiet boto3

    - name: Load Configuration and Setup Instance
      id: config
      run: |
        export CONFIG_FILE="${{ inputs.config_file }}"
        export INSTANCE_NAME="${{ inputs.instance_name }}"
        export AWS_REGION="${{ inputs.aws_region || 'us-east-1' }}"
        export SKIP_TESTS="${{ inputs.skip_tests }}"
        python3 workflows/setup_instance.py

  # OPTIMIZATION: test and application-package run in PARALLEL (both only need load-config)
  test:
    needs: load-config
    runs-on: ubuntu-latest
    if: needs.load-config.outputs.test_enabled == 'true' && inputs.skip_tests != true
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      if: contains(needs.load-config.outputs.enabled_dependencies, 'php')
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: pdo, pdo_mysql, curl, json, mbstring

    - name: Setup Python
      if: contains(needs.load-config.outputs.enabled_dependencies, 'python')
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: pip  # OPTIMIZATION: cache pip for test job too

    - name: Setup Node.js
      if: contains(needs.load-config.outputs.enabled_dependencies, 'nodejs')
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: npm  # OPTIMIZATION: cache npm

    - name: Run tests
      run: |
        echo "🧪 Running tests for ${{ needs.load-config.outputs.app_type }}..."
        # Validate config YAML
        python3 -c "import yaml; yaml.safe_load(open('${{ inputs.config_file }}'))" && echo "✅ Config YAML valid"
        # PHP syntax check
        if echo "${{ needs.load-config.outputs.enabled_dependencies }}" | grep -q php; then
          find . -name "*.php" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || true
        fi

  application-package:
    needs: load-config
    runs-on: ubuntu-latest
    if: needs.load-config.outputs.should_deploy == 'true'
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
        role-duration-seconds: 900  # OPTIMIZATION: reduced
        aws-region: ${{ needs.load-config.outputs.aws_region }}

    # OPTIMIZATION: Cache node_modules for React/Node builds
    - name: Setup Node.js with cache
      if: contains(needs.load-config.outputs.enabled_dependencies, 'nodejs')
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: npm

    - name: Build application
      run: |
        python3 << 'EOF'
        import yaml, os, json, subprocess

        with open('${{ inputs.config_file }}') as f:
            config = yaml.safe_load(f)

        package_files = config.get('application', {}).get('package_files', [])

        # Build React if present
        for d in package_files:
            pkg = os.path.join(d, 'package.json') if os.path.isdir(d) else None
            if pkg and os.path.exists(pkg):
                data = json.load(open(pkg))
                if 'react' in data.get('dependencies', {}):
                    print(f"Building React in {d}")
                    subprocess.run(['npm', 'ci', '--prefer-offline'], cwd=d, check=True)
                    subprocess.run(['npm', 'run', 'build'], cwd=d, check=True)
                    break

        # Build Node/TS if build_command set
        nodejs_cfg = config.get('dependencies', {}).get('nodejs', {})
        if nodejs_cfg.get('enabled') and nodejs_cfg.get('config', {}).get('build_command'):
            build_cmd = nodejs_cfg['config']['build_command']
            for d in package_files:
                if os.path.exists(os.path.join(d, 'package.json')):
                    subprocess.run(['npm', 'ci', '--prefer-offline'], cwd=d, check=True)
                    subprocess.run(build_cmd.split(), cwd=d, check=True)
                    break
        EOF

    - name: Create deployment package
      run: |
        python3 << 'EOF'
        import yaml, os, subprocess, json

        with open('${{ inputs.config_file }}') as f:
            config = yaml.safe_load(f)

        package_files = config.get('application', {}).get('package_files', [])
        existing = [f for f in package_files if os.path.exists(f)]

        if existing:
            cmd = ['tar', '-czf', 'app.tar.gz'] + existing
        else:
            cmd = ['tar', '-czf', 'app.tar.gz',
                   '--exclude=.git', '--exclude=.github',
                   '--exclude=node_modules', '--exclude=*.tar.gz', '.']

        r = subprocess.run(cmd, capture_output=True, text=True)
        if r.returncode not in [0, 1]:
            print(r.stderr); exit(r.returncode)
        print("✅ Package created")
        EOF

    - name: Upload application package
      uses: actions/upload-artifact@v4
      with:
        name: application-package
        path: app.tar.gz
        retention-days: 1

  pre-steps-generic:
    needs: [load-config, test, application-package]
    runs-on: ubuntu-latest
    timeout-minutes: 20  # OPTIMIZATION: reduced from 25
    if: |
      always() &&
      needs.load-config.outputs.should_deploy == 'true' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.application-package.result == 'success'
    environment: ${{ inputs.environment != '' && inputs.environment || null }}
    steps:
    - uses: actions/checkout@v4

    # OPTIMIZATION: Restore cached scripts instead of re-cloning
    - name: Restore deployment scripts from cache
      uses: actions/cache@v4
      with:
        path: workflows
        key: deploy-scripts-${{ github.sha }}
        restore-keys: deploy-scripts-

    - name: Fallback checkout if cache miss
      if: hashFiles('workflows/setup_instance.py') == ''
      uses: actions/checkout@v4
      with:
        repository: naveenraj44125-creator/lamp-stack-lightsail
        path: _deployment_scripts
        sparse-checkout: workflows
    - name: Fallback copy scripts
      if: hashFiles('workflows/setup_instance.py') == ''
      run: cp -r _deployment_scripts/workflows ./workflows && rm -rf _deployment_scripts

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
        role-duration-seconds: 900
        aws-region: ${{ needs.load-config.outputs.aws_region }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-boto3-pyyaml-${{ runner.os }}
        restore-keys: pip-boto3-

    - name: Setup Python
      run: python3 -m pip install --quiet boto3 pyyaml

    - name: Pre-flight & Dependency Installation
      run: |
        export GITHUB_ACTIONS=true
        export PYTHONPATH="${PYTHONPATH}:$(pwd)/workflows"
        python3 workflows/deploy-pre-steps-generic.py \
          --instance-name ${{ needs.load-config.outputs.instance_name }} \
          --region ${{ needs.load-config.outputs.aws_region }} \
          --config-file ${{ inputs.config_file }} \
          --os-type ${{ needs.load-config.outputs.os_type }} \
          --package-manager ${{ needs.load-config.outputs.package_manager }}

  post-steps-generic:
    needs: [load-config, pre-steps-generic, application-package]
    runs-on: ubuntu-latest
    timeout-minutes: 20  # OPTIMIZATION: reduced from 30
    if: |
      always() &&
      needs.load-config.outputs.should_deploy == 'true' &&
      needs.pre-steps-generic.result == 'success' &&
      needs.application-package.result == 'success'
    environment: ${{ inputs.environment != '' && inputs.environment || null }}
    steps:
    - uses: actions/checkout@v4

    # OPTIMIZATION: Restore cached scripts
    - name: Restore deployment scripts from cache
      uses: actions/cache@v4
      with:
        path: workflows
        key: deploy-scripts-${{ github.sha }}
        restore-keys: deploy-scripts-

    - name: Fallback checkout if cache miss
      if: hashFiles('workflows/setup_instance.py') == ''
      uses: actions/checkout@v4
      with:
        repository: naveenraj44125-creator/lamp-stack-lightsail
        path: _deployment_scripts
        sparse-checkout: workflows
    - name: Fallback copy scripts
      if: hashFiles('workflows/setup_instance.py') == ''
      run: cp -r _deployment_scripts/workflows ./workflows && rm -rf _deployment_scripts

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
        role-duration-seconds: 900
        aws-region: ${{ needs.load-config.outputs.aws_region }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-boto3-pyyaml-${{ runner.os }}
        restore-keys: pip-boto3-

    - name: Setup Python
      run: python3 -m pip install --quiet boto3 pyyaml

    - name: Download application package
      uses: actions/download-artifact@v4
      with:
        name: application-package

    - name: Deploy Application
      run: |
        export GITHUB_ACTIONS=true
        export PYTHONPATH="${PYTHONPATH}:$(pwd)/workflows"
        export DOCKER_IMAGE_TAG="${{ inputs.docker_image_tag }}"
        python3 workflows/deploy-post-steps-generic.py \
          app.tar.gz \
          --instance-name ${{ needs.load-config.outputs.instance_name }} \
          --region ${{ needs.load-config.outputs.aws_region }} \
          --config-file ${{ inputs.config_file }} \
          --os-type ${{ needs.load-config.outputs.os_type }} \
          --package-manager ${{ needs.load-config.outputs.package_manager }} \
          --verify --cleanup \
          --env GITHUB_SHA=${{ github.sha }} \
          --env GITHUB_REF=${{ github.ref_name }} \
          --env GITHUB_ACTOR=${{ github.actor }} \
          --env GITHUB_RUN_ID=${{ github.run_id }} \
          --env APP_TYPE=${{ needs.load-config.outputs.app_type }} \
          --env APP_VERSION=${{ needs.load-config.outputs.app_version }} \
          --env DOCKER_IMAGE_TAG="${{ inputs.docker_image_tag }}"

  verification:
    needs: [load-config, post-steps-generic]
    runs-on: ubuntu-latest
    if: always()
    outputs:
      app_url: ${{ steps.set-outputs.outputs.app_url }}
      status: ${{ steps.set-outputs.outputs.status }}
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
        role-duration-seconds: 900
        aws-region: ${{ needs.load-config.outputs.aws_region || 'us-east-1' }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-boto3-pyyaml-${{ runner.os }}
        restore-keys: pip-boto3-

    - name: Setup Python
      run: python3 -m pip install --quiet boto3 pyyaml

    - name: Verify Deployment
      id: connectivity
      run: |
        PORT="${{ needs.load-config.outputs.verification_port }}"
        PATH_="${{ needs.load-config.outputs.verification_path }}"
        IP="${{ needs.load-config.outputs.static_ip }}"
        URL="http://${IP}:${PORT}${PATH_}"
        echo "📍 Verifying: $URL"

        # OPTIMIZATION: reduced initial wait from 60s to 20s
        echo "⏳ Waiting 20s for services to initialize..."
        sleep 20

        # OPTIMIZATION: reduced from 15 attempts x 15s to 10 attempts x 10s = max 100s vs 225s
        for i in {1..10}; do
          HTTP=$(curl -s -o /tmp/resp.html -w "%{http_code}" --connect-timeout 8 --max-time 20 "$URL" || echo "000")
          echo "Attempt $i/10: HTTP $HTTP"
          if [ "$HTTP" = "200" ]; then
            if grep -qi "Welcome to nginx!" /tmp/resp.html; then
              echo "⚠️ nginx default page - app not configured yet"
            else
              echo "✅ Application responding!"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          sleep 10
        done
        echo "status=failed" >> $GITHUB_OUTPUT
        exit 1

    - name: Set Outputs
      id: set-outputs
      if: always()
      run: |
        PORT="${{ needs.load-config.outputs.verification_port }}"
        IP="${{ needs.load-config.outputs.static_ip }}"
        if [ "$PORT" = "80" ]; then
          echo "app_url=http://${IP}/" >> $GITHUB_OUTPUT
        else
          echo "app_url=http://${IP}:${PORT}/" >> $GITHUB_OUTPUT
        fi
        echo "status=${{ steps.connectivity.outputs.status || 'failed' }}" >> $GITHUB_OUTPUT

    - name: Deployment Summary
      if: always()
      run: |
        echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **App**: ${{ needs.load-config.outputs.app_name }} v${{ needs.load-config.outputs.app_version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ steps.connectivity.outputs.status || 'failed' }}" >> $GITHUB_STEP_SUMMARY
        PORT="${{ needs.load-config.outputs.verification_port }}"
        IP="${{ needs.load-config.outputs.static_ip }}"
        if [ "$PORT" = "80" ]; then
          echo "- **URL**: http://${IP}/" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **URL**: http://${IP}:${PORT}/" >> $GITHUB_STEP_SUMMARY
        fi
